document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"e9284319-cd60-40de-918e-e9989cd46fd0\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}\n  html,body{margin:0;padding:0;background:#0B1726;}\n  *{box-sizing:border-box}\n  ::-webkit-scrollbar{display:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#0B1726;color:#F4F7FB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:90px\">\n  <div style=\"max-width:560px;margin:0 auto;zoom:{{ zoom }}\">\n\n    <header style=\"padding:22px 18px 16px;background:linear-gradient(180deg,#0F1F33,#0B1726);border-bottom:1px solid #21466E\">\n      <p style=\"margin:0 0 4px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#F2A93B;font-weight:700\">FAVB Selección<\u002Fp>\n      <h1 style=\"margin:0;font-size:26px;letter-spacing:.04em;text-transform:uppercase;font-weight:800;line-height:1\">ASTURIAS<span style=\"color:#F2A93B;margin:0 6px\">·<\u002Fspan>CESA<\u002Fh1>\n      <p style=\"margin:6px 0 0;font-size:13px;color:#92A6C2\">{{ metaLine }}<\u002Fp>\n    <\u002Fheader>\n\n    <sc-if value=\"{{ showResumen }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:sticky;top:0;z-index:12;display:flex;align-items:center;gap:9px;background:rgba(11,23,38,.93);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid #21466E;padding:11px 18px;box-shadow:0 4px 14px rgba(0,0,0,.25)\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:{{ resumenDot }};flex:none;animation:{{ resumenPulse }}\"><\u002Fspan>\n        <span style=\"font-size:13px;font-weight:600;color:#DCE6F2;line-height:1.4\">{{ resumenLine }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <main style=\"padding:14px 18px 18px\">\n\n      <div style=\"display:flex;gap:6px;background:#0F1F33;border:1px solid #21466E;border-radius:11px;padding:4px;margin-bottom:11px\">\n        <button onclick=\"{{ setProximos }}\" style=\"{{ tabProxStyle }}\">Próximos<\u002Fbutton>\n        <button onclick=\"{{ setAgenda }}\" style=\"{{ tabAgendaStyle }}\">Agenda<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px\">\n        <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ chip.onClick }}\" style=\"{{ chip.style }}\">\n            <sc-if value=\"{{ chip.hasDot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ chip.color }};flex:none\"><\u002Fspan><\u002Fsc-if>\n            {{ chip.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showHero }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-bottom:26px\">\n          <p style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#92A6C2;font-weight:800;margin:0 0 8px\">Siguiente partido<\u002Fp>\n          <div style=\"position:relative;background:#15304E;border:1px solid #21466E;border-radius:16px;padding:16px 16px 14px;border-top:3px solid {{ hero.catAccent }}\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px\">\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:{{ hero.catAccent }}\">\n                <span style=\"width:8px;height:8px;border-radius:50%;background:{{ hero.catAccent }}\"><\u002Fspan>{{ hero.catSymbol }} {{ hero.categoria }}\n              <\u002Fspan>\n              <span style=\"font-size:10px;font-weight:800;letter-spacing:.1em;color:#0B1726;background:{{ hero.catAccent }};padding:3px 8px;border-radius:6px\">ASTURIAS<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-bottom:11px\">\n              <span style=\"font-size:44px;font-weight:800;letter-spacing:.01em;line-height:.9;font-variant-numeric:tabular-nums\">{{ hero.hora }}<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;background:{{ hero.chipBg }};color:{{ hero.chipColor }}\">\n                <sc-if value=\"{{ hero.pulseDot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ hero.chipColor }};animation:pulse 1.4s infinite\"><\u002Fspan><\u002Fsc-if>\n                {{ hero.dayChip }}\n              <\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;flex-wrap:wrap;gap:7px;font-size:18px;line-height:1.25;margin-bottom:9px\">\n              <span style=\"font-weight:800;color:{{ hero.localColor }}\">{{ hero.localName }}<\u002Fspan>\n              <span style=\"color:#92A6C2;font-weight:500;font-size:13px\">vs<\u002Fspan>\n              <span style=\"font-weight:800;color:{{ hero.visitColor }}\">{{ hero.visitName }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;font-size:12px;color:#92A6C2;margin-bottom:11px\">\n              <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;color:#C98B2C\">{{ hero.numTag }}<\u002Fspan>\n              <span>{{ hero.lugar }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n              <sc-if value=\"{{ hero.hasMaps }}\" hint-placeholder-val=\"{{ true }}\"><a href=\"{{ hero.mapsHref }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:4px;background:rgba(242,169,59,.13);color:#F2A93B;text-decoration:none;font-size:12px;font-weight:700;white-space:nowrap;padding:6px 11px;border-radius:8px\">📍 Cómo llegar<\u002Fa><\u002Fsc-if>\n              <button onclick=\"{{ hero.onShare }}\" style=\"background:rgba(255,255,255,.06);border:1px solid #21466E;color:#C7D4E6;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap\">Compartir<\u002Fbutton>\n              <button onclick=\"{{ hero.onIcs }}\" style=\"background:rgba(255,255,255,.06);border:1px solid #21466E;color:#C7D4E6;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap\">Calendario<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isProximos }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-for list=\"{{ cats }}\" as=\"cat\" hint-placeholder-count=\"4\">\n          <div style=\"margin-bottom:24px\">\n            <p style=\"font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;margin:0 0 9px;display:flex;align-items:center;gap:8px;color:#F4F7FB\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:{{ cat.accent }};flex:none\"><\u002Fspan>{{ cat.name }}\n            <\u002Fp>\n\n            <sc-if value=\"{{ cat.empty }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size:12px;color:#92A6C2;background:#15304E;border:1px dashed #21466E;border-radius:12px;padding:14px;text-align:center;margin:0\">Sin partidos cargados todavía<\u002Fp>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ cat.hasPosibles }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#0F1F33;border:1px solid #21466E;border-radius:10px;padding:9px 11px;margin-bottom:10px\">\n                <p style=\"font-size:11px;color:#92A6C2;margin:0 0 7px;line-height:1.4\">{{ cat.posLabel }}<\u002Fp>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n                  <sc-for list=\"{{ cat.posChips }}\" as=\"pc\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ pc.onClick }}\" style=\"{{ pc.style }}\">{{ pc.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ cat.next }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#15304E;border:1px solid #21466E;border-radius:13px;padding:13px 14px;border-left:3px solid {{ cat.accent }}\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px\">\n                  <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:{{ cat.next.chipColor }}\">\n                    <sc-if value=\"{{ cat.next.pulseDot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ cat.next.chipColor }};animation:pulse 1.4s infinite\"><\u002Fspan><\u002Fsc-if>\n                    {{ cat.next.dayChip }}\n                  <\u002Fspan>\n                  <span style=\"font-size:19px;font-weight:800;color:#F4F7FB;font-variant-numeric:tabular-nums\">{{ cat.next.hora }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;font-size:15px;line-height:1.3;margin-bottom:7px\">\n                  <span style=\"font-weight:700;color:{{ cat.next.localColor }}\">{{ cat.next.localName }}<\u002Fspan>\n                  <span style=\"color:#92A6C2;font-weight:400;font-size:12px\">vs<\u002Fspan>\n                  <span style=\"font-weight:700;color:{{ cat.next.visitColor }}\">{{ cat.next.visitName }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px 12px;align-items:center;font-size:11px;color:#92A6C2\">\n                  <span style=\"font-fam 2Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n            <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Usuario / org<\u002Flabel><input type=\"text\" value=\"{{ gh.owner }}\" onchange=\"{{ gh.onOwner }}\" placeholder=\"danielvega80\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Repositorio<\u002Flabel><input type=\"text\" value=\"{{ gh.repo }}\" onchange=\"{{ gh.onRepo }}\" placeholder=\"CESA26\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:11px\">\n            <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Rama<\u002Flabel><input type=\"text\" value=\"{{ gh.branch }}\" onchange=\"{{ gh.onBranch }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Archivo<\u002Flabel><input type=\"text\" value=\"{{ gh.path }}\" onchange=\"{{ gh.onPath }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:12px\">\n            <button onclick=\"{{ gh.conectar }}\" style=\"flex:1 1 auto;padding:11px 13px;border-radius:10px;border:1px solid #F2A93B;background:#F2A93B;color:#1A1305;font-size:13px;font-weight:700;cursor:pointer\">Guardar y cargar datos<\u002Fbutton>\n            <button onclick=\"{{ gh.quitarToken }}\" style=\"flex:1 1 auto;padding:11px 13px;border-radius:10px;border:1px solid #E2615A;background:rgba(226,97,90,.08);color:#E2615A;font-size:13px;font-weight:700;cursor:pointer\">Quitar token<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Herramientas (siempre visibles) -->\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px\">\n        <button onclick=\"{{ openCapture }}\" style=\"flex:1 1 150px;display:flex;align-items:center;gap:11px;padding:15px 16px;background:linear-gradient(135deg,#15304E,#0F1F33);border:1px solid #21466E;border-radius:14px;font-size:13.5px;font-weight:700;cursor:pointer;color:#F4F7FB;text-align:left\">\n          <span style=\"font-size:18px;width:38px;height:38px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(242,169,59,.14);border-radius:10px\">📷<\u002Fspan>Importar captura\n        <\u002Fbutton>\n        <button onclick=\"{{ openBm }}\" style=\"flex:1 1 150px;display:flex;align-items:center;gap:11px;padding:15px 16px;background:linear-gradient(135deg,#15304E,#0F1F33);border:1px solid #21466E;border-radius:14px;font-size:13.5px;font-weight:700;cursor:pointer;color:#F4F7FB;text-align:left\">\n          <span style=\"font-size:18px;width:38px;height:38px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(242,169,59,.14);border-radius:10px\">🔖<\u002Fspan>Bookmarklet esvoley\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ gh.connected }}\" hint-placeholder-val=\"{{ false }}\">\n        <!-- Torneo y categorías -->\n        <div style=\"border:1px solid #21466E;border-radius:14px;background:#0F1F33;margin-bottom:14px;overflow:hidden\">\n          <p style=\"margin:0;padding:14px 16px;font-size:13.5px;font-weight:700;border-bottom:1px solid #21466E\">🏷 Torneo y categorías<\u002Fp>\n          <div style=\"padding:16px\">\n            <div style=\"margin-bottom:11px\"><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Nombre del torneo<\u002Flabel><input type=\"text\" value=\"{{ meta.nombre }}\" onchange=\"{{ meta.onNombre }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Sede<\u002Flabel><input type=\"text\" value=\"{{ meta.sede }}\" onchange=\"{{ meta.onSede }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Fechas<\u002Flabel><input type=\"text\" value=\"{{ meta.fechas }}\" onchange=\"{{ meta.onFechas }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Editor de partidos -->\n        <div style=\"display:flex;gap:8px;overflow-x:auto;padding:4px 0 14px\">\n          <sc-for list=\"{{ editChips }}\" as=\"ec\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ ec.onClick }}\" style=\"{{ ec.style }}\">{{ ec.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ editMatches }}\" as=\"em\" hint-placeholder-count=\"3\">\n          <div style=\"background:#15304E;border:1px solid #21466E;border-left:3px solid {{ em.borderColor }};border-radius:14px;padding:16px;margin-bottom:14px\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #21466E\">\n              <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;color:#C98B2C;font-size:13px\">#{{ em.numero }} · {{ em.fase }}<\u002Fspan>\n              <button onclick=\"{{ em.onDel }}\" style=\"border:1px solid #E2615A;background:rgba(226,97,90,.08);color:#E2615A;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px\">\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Número<\u002Flabel><input type=\"number\" value=\"{{ em.numero }}\" onchange=\"{{ em.onNumero }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Estado<\u002Flabel><select value=\"{{ em.estado }}\" onchange=\"{{ em.onEstado }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><option value=\"pendiente\">Pendiente<\u002Foption><option value=\"jugado\">Jugado<\u002Foption><\u002Fselect><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:11px\"><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Fase<\u002Flabel><input type=\"text\" value=\"{{ em.fase }}\" onchange=\"{{ em.onFase }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px\">\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Fecha<\u002Flabel><input type=\"date\" value=\"{{ em.fecha }}\" onchange=\"{{ em.onFecha }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Hora<\u002Flabel><input type=\"time\" value=\"{{ em.hora }}\" onchange=\"{{ em.onHora }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px\">\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Local<\u002Flabel><input type=\"text\" value=\"{{ em.local }}\" onchange=\"{{ em.onLocal }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Visitante<\u002Flabel><input type=\"text\" value=\"{{ em.visitante }}\" onchange=\"{{ em.onVisitante }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Sets local<\u002Flabel><input type=\"number\" value=\"{{ em.setsLocal }}\" onchange=\"{{ em.onSetsLocal }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n              <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Sets visitante<\u002Flabel><input type=\"number\" value=\"{{ em.setsVisitante }}\" onchange=\"{{ em.onSetsVisitante }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ em.hasParciales }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:11px;border-top:1px solid #21466E;padding-top:11px\">\n                <p style=\"font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px;font-weight:600\">Puntuación de cada set<\u002Fp>\n                <sc-for list=\"{{ em.parciales }}\" as=\"set\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px\">\n                    <span style=\"font-size:11px;color:#C98B2C;font-family:ui-monospace,monospace;width:42px;flex:none\">Set {{ set.num }}<\u002Fspan>\n                    <input type=\"number\" value=\"{{ set.l }}\" onchange=\"{{ set.onL }}\" style=\"width:54px;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:6px;padding:7px;font-size:14px;text-align:center\">\n                    <span style=\"color:#92A6C2\">–<\u002Fspan>\n                    <input type=\"number\" value=\"{{ set.v }}\" onchange=\"{{ set.onV }}\" style=\"width:54px;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:6px;padding:7px;font-size:14px;text-align:center\">\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"margin-top:11px\"><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Lugar<\u002Flabel><input type=\"text\" value=\"{{ em.lugar }}\" onchange=\"{{ em.onLugar }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:center;font-size:12px;color:#92A6C2;margin:11px 0;flex-wrap:wrap\">\n              <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ em.esAsturias }}\" onchange=\"{{ em.onEsAst }}\"> Confirmado Asturias<\u002Flabel>\n              <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ em.posibleAsturias }}\" onchange=\"{{ em.onPosible }}\"> Posible<\u002Flabel>\n            <\u002Fdiv>\n            <div><label style=\"display:block;font-size:10.5px;color:#92A6C2;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600\">Nota<\u002Flabel><input type=\"text\" value=\"{{ em.notaPosible }}\" onchange=\"{{ em.onNota }}\" style=\"width:100%;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:9px;padding:11px 12px;font-size:14px\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ editEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"font-size:12.5px;color:#92A6C2;margin:0 0 14px\">Sin partidos de {{ editCat }}. Usa \"Añadir partido\".<\u002Fp>\n        <\u002Fsc-if>\n\n        <button onclick=\"{{ addMatch }}\" style=\"width:100%;padding:11px 13px;border-radius:10px;border:1px solid #21466E;background:#0F1F33;color:#F4F7FB;font-size:13px;font-weight:700;cursor:pointer\">+ Añadir partido<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ gh.connected }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:42;background:rgba(11,23,38,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid #21466E;padding:12px 16px\">\n        <div style=\"max-width:640px;margin:0 auto;display:flex;gap:10px\">\n          <button onclick=\"{{ publicar }}\" style=\"flex:2;padding:12px;border-radius:10px;border:1px solid #F2A93B;background:#F2A93B;color:#1A1305;font-size:13px;font-weight:700;cursor:pointer\">{{ publishLabel }}<\u002Fbutton>\n          <button onclick=\"{{ descartar }}\" style=\"flex:1;padding:12px;border-radius:10px;border:1px solid #21466E;background:#15304E;color:#92A6C2;font-size:13px;font-weight:700;cursor:pointer\">Descartar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- MODAL captura -->\n  <div style=\"position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.65);display:{{ captureDisplay }};align-items:flex-end;justify-content:center\" onclick=\"{{ closeCapture }}\">\n    <div onclick=\"{{ stop }}\" style=\"background:#0F1F33;border:1px solid #21466E;border-radius:18px 18px 0 0;padding:16px 18px 30px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto\">\n      <div style=\"width:36px;height:4px;border-radius:3px;background:#21466E;margin:0 auto 14px\"><\u002Fdiv>\n      <h2 style=\"margin:0 0 6px;font-size:17px\">📷 Importar desde captura<\u002Fh2>\n      <p style=\"font-size:12.5px;color:#92A6C2;line-height:1.55;margin:0 0 14px\">Sube una captura de los resultados de esvoley.es. Claude leerá los marcadores y te mostrará lo detectado para confirmarlo antes de guardar.<\u002Fp>\n      <label style=\"display:block;border:2px dashed #21466E;border-radius:12px;padding:26px 20px;text-align:center;cursor:pointer\">\n        <span style=\"font-size:32px\">📸<\u002Fspan>\n        <p style=\"margin:8px 0 0;font-size:13px;color:#92A6C2\">Pulsa para elegir una imagen<\u002Fp>\n        <input type=\"file\" accept=\"image/*\" onchange=\"{{ onImg }}\" style=\"display:none\">\n      <\u002Flabel>\n      <sc-if value=\"{{ hasPreview }}\" hint-placeholder-val=\"{{ false }}\">{{ previewImgEl }}<\u002Fsc-if>\n      <sc-if value=\"{{ hasParsed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:14px\">\n          <h2 style=\"margin:0 0 10px;font-size:15px\">Resultados detectados<\u002Fh2>\n          <sc-for list=\"{{ parsed }}\" as=\"r\" hint-placeholder-count=\"2\">\n            <div style=\"background:#15304E;border:1px solid #21466E;border-radius:10px;padding:12px;margin-bottom:9px\">\n              <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">{{ r.title }} <span style=\"font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;background:{{ r.badgeBg }};color:{{ r.badgeColor }};margin-left:6px\">{{ r.badge }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap\">\n                <span style=\"font-size:12px;color:#92A6C2\">{{ r.localShort }}<\u002Fspan>\n                <input type=\"number\" value=\"{{ r.setsLocal }}\" onchange=\"{{ r.onL }}\" style=\"width:54px;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:6px;padding:6px;font-size:14px;text-align:center\">\n                <span style=\"color:#92A6C2\">—<\u002Fspan>\n                <input type=\"number\" value=\"{{ r.setsVisitante }}\" onchange=\"{{ r.onV }}\" style=\"width:54px;background:#0B1726;color:#F4F7FB;border:1px solid #21466E;border-radius:6px;padding:6px;font-size:14px;text-align:center\">\n                <span style=\"font itivo (no 0-0). Responde ÚNICAMENTE con un array JSON sin texto adicional, sin bloques de código. Formato exacto: [{\"numero\":8,\"local\":\"ASTURIAS\",\"visitante\":\"CASTILLA LA MANCHA\",\"setsLocal\":3,\"setsVisitante\":1}]. Si \"numero\" no aparece, ponlo null. Si no hay ninguno, devuelve [].`}\n        ]}]\n      })});\n      const data=await resp.json();\n      const txt=(data.content&&data.content.find(b=>b.type==='text')?.text||'[]').trim();\n      const parsed=JSON.parse(txt.replace(/^```json|^```|```$/gm,'').trim());\n      this.setState({parsed, captureStatus:{msg: parsed.length?`✓ ${parsed.length} partido(s) detectado(s). Revisa y confirma.`:'Claude no detectó resultados de Asturias.', tipo:parsed.length?'ok':'info'}});\n    }catch(e){ this.setState({captureStatus:{msg:'Error al analizar: '+e.message,tipo:'err'}}); }\n  }\n  async aplicarCaptura(){\n    if(!this.state.data || !this.state.parsed.length) return;\n    this.setState({captureStatus:{msg:'Aplicando y guardando en GitHub…',tipo:'info'}});\n    const d=JSON.parse(JSON.stringify(this.state.data)); let n=0;\n    this.state.parsed.forEach(r=>{\n      let m=null;\n      if(r.numero) m=d.partidos.find(p=>p.numero===r.numero);\n      if(!m&&r.local) m=d.partidos.find(p=>p.local.toUpperCase()===String(r.local).toUpperCase()&&p.visitante.toUpperCase()===String(r.visitante).toUpperCase());\n      if(m){ m.setsLocal=r.setsLocal; m.setsVisitante=r.setsVisitante; m.estado='jugado'; n++; }\n    });\n    try{\n      const resp=await this.ghPut(d, `Resultados desde captura · ${new Date().toLocaleString('es-ES')}`);\n      this.setState({data:d, sha:resp.content.sha, dirty:false, captureStatus:{msg:`✓ ${n} partido(s) guardado(s) en GitHub`,tipo:'ok'}});\n    }catch(e){ this.setState({captureStatus:{msg:'Error al guardar: '+e.message,tipo:'err'}}); }\n  }\n\n  statusColors(tipo){\n    if(tipo==='ok') return {bg:'rgba(79,174,130,.15)', color:'#4FAE82'};\n    if(tipo==='err') return {bg:'rgba(226,97,90,.15)', color:'#E2615A'};\n    return {bg:'rgba(146,166,194,.12)', color:'#92A6C2'};\n  }\n\n  renderVals(){\n    const data=this.state.data, meta=(data&&data.torneo)||{};\n    const metaLine=[meta.nombre,meta.sede,meta.fechas].filter(Boolean).join(' · ')||'Sin datos cargados';\n    const fc=this.state.filterCat, isProximos=this.state.view==='proximos';\n    const c=this.cfg();\n    const connected=!!this.state.sha;\n    const gs=this.state.ghStatus, gsc=gs?this.statusColors(gs.tipo):null;\n    const cs=this.state.captureStatus, csc=cs?this.statusColors(cs.tipo):null;\n\n    const chips=[{key:null,label:'Todas',color:'#F2A93B',hasDot:false}].concat(this.CAT_ORDER.map(cc=>({key:cc,label:this.shortCat(cc),color:this.accentFor(cc),hasDot:true})))\n      .map(cc=>({ label:cc.label, color:cc.color, hasDot:cc.hasDot, style:this.chipStyle((cc.key||null)===(fc||null), cc.color), onClick:()=>this.setFilter(cc.key) }));\n\n    const gh={\n      hasStatus:!!gs, statusMsg:gs?gs.msg:'', statusBg:gsc?gsc.bg:'', statusColor:gsc?gsc.color:'',\n      connected,\n      token:c.token, owner:c.owner, repo:c.repo, branch:c.branch, path:c.path,\n      tokenType:this.state.showToken?'text':'password', tokenBtn:this.state.showToken?'ocultar':'mostrar',\n      toggleToken:()=>this.setState(s=>({showToken:!s.showToken})),\n      onToken:e=>this.setCfg('token',e.target.value.trim()),\n      onOwner:e=>this.setCfg('owner',e.target.value.trim()),\n      onRepo:e=>this.setCfg('repo',e.target.value.trim()),\n      onBranch:e=>this.setCfg('branch',e.target.value.trim()||'main'),\n      onPath:e=>this.setCfg('path',e.target.value.trim()||'partidos.json'),\n      conectar:()=>this.cargarDesdeGitHub(),\n      quitarToken:()=>{ localStorage.removeItem('gh_token'); this.setState({ghStatus:{msg:'Token eliminado.',tipo:'info'}}); }\n    };\n\n    const metaVm={\n      nombre:meta.nombre||'', sede:meta.sede||'', fechas:meta.fechas||'',\n      onNombre:e=>this.mutateData(d=>{ if(!d.torneo)d.torneo={}; d.torneo.nombre=e.target.value; }),\n      onSede:e=>this.mutateData(d=>{ if(!d.torneo)d.torneo={}; d.torneo.sede=e.target.value; }),\n      onFechas:e=>this.mutateData(d=>{ if(!d.torneo)d.torneo={}; d.torneo.fechas=e.target.value; })\n    };\n\n    const editCat=this.state.editCat||this.CAT_ORDER[0];\n    const editChips=this.CAT_ORDER.map(cat=>({ label:this.shortCat(cat), style:this.editChipStyle(cat===editCat), onClick:()=>this.setState({editCat:cat}) }));\n\n    let editMatches=[];\n    if(data&&data.partidos){\n      editMatches = data.partidos.map((p,i)=>({p,i})).filter(o=>o.p.categoria===editCat).sort((a,b)=>(a.p.numero||0)-(b.p.numero||0)).map(({p,i})=>{\n        const total=(parseInt(p.setsLocal)||0)+(parseInt(p.setsVisitante)||0);\n        const parciales=[];\n        for(let s=0;s<total;s++){ const par=(p.parciales&&p.parciales[s])||{l:25,v:0};\n          parciales.push({ num:s+1, l:par.l, v:par.v,\n            onL:e=>this.mutateData(d=>{ const m=d.partidos[i]; if(!m.parciales)m.parciales=[]; while(m.parciales.length<total)m.parciales.push({l:25,v:0}); m.parciales=m.parciales.slice(0,total); m.parciales[s].l=parseInt(e.target.value)||0; }),\n            onV:e=>this.mutateData(d=>{ const m=d.partidos[i]; if(!m.parciales)m.parciales=[]; while(m.parciales.length<total)m.parciales.push({l:25,v:0}); m.parciales=m.parciales.slice(0,total); m.parciales[s].v=parseInt(e.target.value)||0; }) });\n        }\n        const setF=(f,parse)=>e=>this.mutateData(d=>{ let v=e.target.value; if(parse)v=v===''?'':parseInt(v); d.partidos[i][f]=v; });\n        return {\n          i, numero:p.numero??'', fase:p.fase||'', estado:p.estado==='jugado'?'jugado':'pendiente',\n          fecha:p.fecha||'', hora:p.hora||'', local:p.local||'', visitante:p.visitante||'',\n          setsLocal:p.setsLocal??0, setsVisitante:p.setsVisitante??0, lugar:p.lugar||'', notaPosible:p.notaPosible||'',\n          esAsturias:!!p.esAsturias, posibleAsturias:!!p.posibleAsturias,\n          borderColor: p.esAsturias?'#4FA de ? 1.18 : 1,\n      isProximos, isAgenda:!isProximos,\n      tabProxStyle:this.tabStyle(isProximos), tabAgendaStyle:this.tabStyle(!isProximos),\n      setProximos:()=>this.setView('proximos'), setAgenda:()=>this.setView('agenda'),\n      chips, fuente:this.state.fuente,\n      jsonText:this.state.jsonText, sheetError:this.state.sheetError, sheetStatus:this.state.sheetStatus,\n      grandeBtnLabel:this.state.grande?'Activado':'Desactivado',\n      grandeBtnStyle:`border:1px solid ${this.state.grande?'#F2A93B':'#21466E'};background:${this.state.grande?'#F2A93B':'transparent'};color:${this.state.grande?'#1A1305':'#92A6C2'};font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer`,\n      sheetOpacity:this.state.sheetOpen?1:0, sheetPointer:this.state.sheetOpen?'auto':'none', sheetY:this.state.sheetOpen?'0':'105%',\n      openSheet:()=>this.setState({sheetOpen:true}),\n      closeSheet:()=>this.setState({sheetOpen:false}),\n      recargar:async()=>{ this.setState({sheetStatus:'Recargando…'}); await this.load(); this.setState({sheetStatus:'Recargado.'}); },\n      verJson:()=>this.setState({jsonText:JSON.stringify(this.state.data,null,2)}),\n      onJsonChange:(e)=>this.setState({jsonText:e.target.value}),\n      toggleGrande:()=>this.toggleGrande(),\n      anular:()=>{ try{ const parsed=JSON.parse(this.state.jsonText.trim()); if(!parsed.partidos) throw new Error('Falta la clave \"partidos\"'); localStorage.setItem('override_partidos',JSON.stringify(parsed)); this.setState({sheetError:'',sheetStatus:'Anulación guardada en este móvil.'}); this.load(); }catch(e){ this.setState({sheetError:'JSON no válido: '+e.message}); } },\n      quitarAnulacion:()=>{ localStorage.removeItem('override_partidos'); this.setState({sheetStatus:'Anulación eliminada. Usando datos remotos/caché.'}); this.load(); },\n      // admin\n      openAdmin:()=>this.setState({adminOpen:true, sheetOpen:false}),\n      closeAdmin:()=>this.setState({adminOpen:false}),\n      adminY:this.state.adminOpen?'0':'100%', adminPointer:this.state.adminOpen?'auto':'none',\n      gh, meta:metaVm, editChips, editMatches, editCat, editEmpty: connected && editMatches.length===0,\n      addMatch:()=>this.mutateData(d=>{ const cat=d.partidos.filter(p=>p.categoria===editCat); const next=cat.length?Math.max(...cat.map(p=>p.numero||0))+1:1; d.partidos.push({categoria:editCat,numero:next,fase:'',fecha:'',hora:'',local:'',visitante:'',lugar:'',setsLocal:0,setsVisitante:0,estado:'pendiente',esAsturias:false,posibleAsturias:false,notaPosible:''}); }),\n      publishLabel:this.state.dirty?'Guardar y publicar •':'Guardar y publicar en GitHub',\n      publicar:async()=>{ if(!this.state.data){ this.ghStatus('Primero conecta y carga los datos.','err'); return; } this.ghStatus('Publicando en GitHub…','info'); try{ const resp=await this.ghPut(this.state.data,`Actualiza partidos · ${new Date().toLocaleString('es-ES')}`); this.setState({sha:resp.content.sha, dirty:false, ghStatus:{msg:'Publicado correctamente · '+new Date().toLocaleString('es-ES'),tipo:'ok'}}); }catch(e){ this.ghStatus(/409/.test(e.message)?'Conflicto: el archivo cambió en GitHub. Descarta y reaplica.':'Error al publicar: '+e.message,'err'); } },\n      descartar:async()=>{ if(this.state.dirty && !confirm('Se perderán los cambios. ¿Continuar?')) return; await this.cargarDesdeGitHub(); },\n      // capture modal\n      captureDisplay:this.state.captureOpen?'flex':'none',\n      openCapture:()=>this.setState({captureOpen:true, parsed:[], imgB64:null, imgPreview:null, captureStatus: connected?null:{msg:'Conecta antes con GitHub (arriba) para poder guardar los resultados.',tipo:'info'}}),\n      closeCapture:()=>this.setState({captureOpen:false}),\n      onImg:e=>this.onImg(e), analizar:()=>this.analizar(), aplicarCaptura:()=>this.aplicarCaptura(),\n      hasPreview:!!this.state.imgPreview,\n      previewImgEl: this.state.imgPreview ? React.createElement('img',{src:this.state.imgPreview, style:{maxWidth:'100%',borderRadius:'8px',marginTop:'12px',display:'block'}}) : null,\n      hasParsed:this.state.parsed.length>0, parsed:parsedVm,\n      analizarDisabled:!this.state.imgB64, analizarOpacity:this.state.imgB64?1:.5,\n      capture:{ hasStatus:!!cs, statusMsg:cs?cs.msg:'', statusBg:csc?csc.bg:'', statusColor:csc?csc.color:'' },\n      // bookmarklet modal\n      bmDisplay:this.state.bmOpen?'flex':'none',\n      openBm:()=>this.setState({bmOpen:true}),\n      closeBm:()=>this.setState({bmOpen:false}),\n      bmHref:'javascript:'+encodeURIComponent(this.bookmarkletCode()),\n      bmClick:(e)=>{ e.preventDefault(); },\n      stop:(e)=>{ e.stopPropagation(); }\n    };\n\n    if(!data || !data.partidos){ return {...base, hero:null, showHero:false, cats:[], agenda:[], agendaEmpty:true, noData:!!data, resumenLine:'', resumenDot:'#4FAE82', resumenPulse:'none'}; }\n\n    const scope = fc ? [fc] : this.CAT_ORDER;\n    const inScope = p => scope.indexOf(p.categoria)>=0;\n    const scopeConf = data.partidos.filter(p=>this.esAsturias(p) && inScope(p)).sort((a,b)=>this.fechaHora(a)-this.fechaHora(b));\n    const heroP = scopeConf.find(p=>p.estado!=='jugado') || null;\n    const hero = heroP ? {...this.mvm(heroP), categoria:heroP.categoria, catAccent:this.accentFor(heroP.categoria), catSymbol:this.symbolFor(heroP.categoria)} : null;\n    const showHero = isProximos && !fc && !!hero;\n\n    let resumenLine, resumenDot='#4FAE82', resumenPulse='none';\n    if(hero){\n      resumenLine = `Siguiente · ${hero.dayChip} ${hero.hora} · ${hero.localName} vs ${hero.visitName} · ${hero.lugar}`;\n      if(hero.live){ resumenDot='#4FAE82'; resumenPulse='pulse 1.4s infinite'; }\n      else if(this.statusKind(heroP)==='future' && this.minsTo(heroP)<=30){ resumenDot='#E2615A'; resumenPulse='pulse 1.4s infinite'; }\n      else { resumenDot='#F2A93B'; }\n    } else { resumenLine='Torneo finalizado'; }\n\n    const cats=this.CAT_ORDER.filter(cat=>scope.indexOf(cat)>=0).map(cat=>{\n      const idx=this.CAT_ORDER.indexOf(cat);\n      const all=data.partidos.filter(p=>p.categoria===cat && this.relevante(p));\n      const list=all.filter(p=>this.keepMatch(p)).sort((a,b)=>this.fechaHora(a)-this.fechaHora(b));\n      const next=list.find(p=>p.estado!=='jugado');\n      const jugados=list.filter(p=>p.estado==='jugado');\n      const last=jugados.length?jugados[jugados.length-1]:null;\n      const groups={}; list.forEach(p=>{ (groups[p.fecha]=groups[p.fecha]||[]).push(p); });\n      const dateGroups=Object.keys(groups).sort().map(f=>({ label:this.formatFecha(f), matches:groups[f].map(p=>this.mvm(p)) }));\n      const open=!!this.state.open[idx];\n      const hasPosibles=all.some(p=>this.esPosible(p) && !this.esAsturias(p));\n      const pos=this.state.posGrupo[cat];\n      const posChips=[1,2,3,4].map(n=>({ label:n+'ª', style:this.posChipStyle(pos===n, this.accentFor(cat)), onClick:()=>this.setPos(cat,n) }));\n      return {\n        name:cat, accent:this.accentFor(cat), idx,\n        empty:list.length===0, hasList:list.length>0,\n        next: next?this.mvm(next):null,\n        phaseEnded: list.length>0 && !next,\n        last: last?this.lvm(last):null,\n        open, dateGroups, hasPosibles, posChips,\n        posLabel: pos!=null ? `Asturias quedó ${pos}ª — mostrando solo su cruce` : 'Posición de Asturias en el grupo (filtra los cruces):',\n        toggleLabel: open?'Ocultar partidos ▴':`Ver todos los partidos (${list.length}) ▾`,\n        onToggle:()=>this.toggle(idx)\n      };\n    });\n\n    const today=this.todayStr();\n    const agendaMatches=data.partidos.filter(p=>inScope(p) && this.relevante(p) && this.keepMatch(p));\n    const ag={}; agendaMatches.forEach(p=>{ (ag[p.fecha]=ag[p.fecha]||[]).push(p); });\n    const agenda=Object.keys(ag).sort().map(f=>({ label:this.formatFecha(f), isToday:f===today, matches:ag[f].sort((a,b)=>this.fechaHora(a)-this.fechaHora(b)).map(p=>this.mvm(p)) }));\n\n    return {...base, hero, showHero, cats, agenda, agendaEmpty:agenda.length===0, noData:false, resumenLine, resumenDot, resumenPulse};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
